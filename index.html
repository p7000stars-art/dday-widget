<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포니 ❤️ 그뇨 D-day</title>
  
  <!-- 파비콘 (브라우저 탭 아이콘) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💗</text></svg>">
  
  <!-- 폰트: Pretendard(한글, 깔끔한 산세리프) + Cormorant Garamond(영문 세리프, 우아한 느낌) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 시즌별 배경 장식 (계절에 따라 자동 변경됨) -->
  <div class="season-decoration" id="seasonDecoration"></div>
  
  <!-- 메인 위젯 컨테이너 -->
  <main class="widget">
    
    <!-- 메인 D-day 카드 (사귄날 등 가장 중요한 이벤트 표시) -->
    <section class="hero-card" id="heroCard">
      <div class="hero-icon" id="heroIcon">💗</div>
      <p class="hero-label" id="heroLabel">우리가 함께한 시간</p>
      <h1 class="hero-dday" id="heroDday">D + 0</h1>
      <p class="hero-date" id="heroDate"></p>
      <p class="hero-message" id="heroMessage"></p>
    </section>
    
    <!-- 다가오는 기념일 카드 (그리드 형태로 자동 정렬) -->
    <section class="upcoming-grid" id="upcomingGrid">
      <!-- JavaScript로 동적 생성됨 -->
    </section>
    
    <!-- 마일스톤 카드 (100일, 1주년 등 자동 계산) -->
    <section class="milestone-card" id="milestoneCard">
      <h2 class="milestone-title">🎯 다가오는 마일스톤</h2>
      <div class="milestone-list" id="milestoneList">
        <!-- JavaScript로 동적 생성됨 -->
      </div>
    </section>
    
    <!-- 푸터 (현재 시간/날짜 표시) -->
    <footer class="widget-footer">
      <span id="currentDate"></span>
      <span class="footer-divider">·</span>
      <span id="currentTime"></span>
    </footer>
    
    <!-- 클릭 시 나타나는 사랑 메시지 (이스터에그 같은 느낌) -->
    <div class="love-popup" id="lovePopup"></div>
    
  </main>
  
  <script src="script.js"></script>
</body>
</html>
